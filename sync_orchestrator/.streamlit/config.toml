# Tema oscuro deportivo nativo — todos los widgets (inputs, selects) nacen
# en modo oscuro, sin pelear con CSS. Paleta consistente con el dashboard.
[theme]
base = "dark"
primaryColor = "#39d353"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
